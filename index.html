    let currentLang = 'fr';

    function applyLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key] !== undefined) el.placeholder = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      // Lien de téléchargement du CV selon la langue
      const cvLink = document.getElementById('downloadCv');
      if (cvLink) {
        cvLink.setAttribute('href', lang === 'en'
          ? 'assets/cv-en-KevinAuchoybur.pdf'
          : 'assets/cv-fr-KevinAuchoybur.pdf');
      }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    // Init FR
    applyLang('fr');

    // ===== DARK MODE =====
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    });

    // ===== SCROLL ACTIVE NAV =====
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.navbar__links a');

    function setActiveLink() {
      const navHeight = document.querySelector('.navbar').offsetHeight;
      let current = '';
      sections.forEach(section => {
        const top = section.getBoundingClientRect().top - navHeight - 10;
        if (top <= 0) current = section.id;
      });
      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === '#' + current) link.classList.add('active');
      });
    }
    window.addEventListener('scroll', setActiveLink, { passive: true });
    setActiveLink();

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navLinks.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });

    // ===== FORMULAIRE DE CONTACT (inline) =====
    const form = document.getElementById('contactForm');
    const success = document.getElementById('modalSuccess');
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xojzvrwj';
    const submitBtn = form.querySelector('.btn-submit');
    const submitLabel = submitBtn.querySelector('[data-i18n="modal.send"]');
    const errorBox = document.getElementById('modalError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('is-visible');
      submitBtn.disabled = true;
      const originalLabel = submitLabel.textContent;
      submitLabel.textContent = translations[currentLang]['modal.sending'];

      try {
        const response = await fetch(FORMSPREE_ENDPOINT, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          // Affiche le message de succès en place du formulaire
          form.style.display = 'none';
          success.classList.add('is-visible');
        } else {
          errorBox.textContent = translations[currentLang]['modal.error'];
          errorBox.classList.add('is-visible');
        }
      } catch (err) {
        errorBox.textContent = translations[currentLang]['modal.error'];
        errorBox.classList.add('is-visible');
      } finally {
        submitBtn.disabled = false;
        submitLabel.textContent = originalLabel;
      }
    });


    // ===== BOUTON RETOUR EN HAUT =====
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 500);
    }, { passive: true });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ===== FOOTER YEAR =====
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== HAMBURGER =====
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('is-open');
      mobileMenu.classList.toggle('is-open');
    });
    document.querySelectorAll('.mobile-menu__link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('is-open');
        mobileMenu.classList.remove('is-open');
      });
    });
  </script>
