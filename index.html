    let currentLang = 'fr';

    function applyLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.getAttribute('data-i18n-html');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key] !== undefined) el.placeholder = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      // Liens de téléchargement du CV selon la langue (section CV + hero)
      const cvHref = lang === 'en'
        ? 'assets/cv-en-KevinAuchoybur.pdf'
        : 'assets/cv-fr-KevinAuchoybur.pdf';
      ['downloadCv', 'heroDownloadCv'].forEach(id => {
        const link = document.getElementById(id);
        if (link) link.setAttribute('href', cvHref);
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    // Init FR
    applyLang('fr');

    // ===== DARK MODE =====
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    });

    // ===== SCROLL ACTIVE NAV =====
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.navbar__links a');

    function setActiveLink() {
      // Ligne de reference a 40% de la hauteur du viewport : une section devient
      // active des qu'elle occupe l'ecran (robuste pour les sections hautes).
      const ref = window.innerHeight * 0.4;
      let current = sections[0].id;
      sections.forEach(section => {
        if (section.getBoundingClientRect().top <= ref) current = section.id;
      });
      // Si on est en bas de page, on force la derniere section comme active.
      const enBasDePage = window.innerHeight + window.scrollY >= document.body.scrollHeight - 2;
      if (enBasDePage) current = sections[sections.length - 1].id;
      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === '#' + current) link.classList.add('active');
      });
    }
    window.addEventListener('scroll', setActiveLink, { passive: true });
    setActiveLink();

    // ===== BARRE DE PROGRESSION DE LECTURE =====
    const progressBar = document.getElementById('readingProgress');
    function updateReadingProgress() {
      const scrollable = document.documentElement.scrollHeight - window.innerHeight;
      const ratio = scrollable > 0 ? Math.min(window.scrollY / scrollable, 1) : 0;
      progressBar.style.transform = 'scaleX(' + ratio + ')';
    }
    window.addEventListener('scroll', updateReadingProgress, { passive: true });
    window.addEventListener('resize', updateReadingProgress, { passive: true });
    updateReadingProgress();

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navLinks.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });

    // ===== FORMULAIRE DE CONTACT (inline) =====
    const form = document.getElementById('contactForm');
    const success = document.getElementById('modalSuccess');
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xojzvrwj';
    const submitBtn = form.querySelector('.btn-submit');
    const submitLabel = submitBtn.querySelector('[data-i18n="modal.send"]');
    const errorBox = document.getElementById('modalError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('is-visible');
      submitBtn.disabled = true;
      const originalLabel = submitLabel.textContent;
      submitLabel.textContent = translations[currentLang]['modal.sending'];

      try {
        const response = await fetch(FORMSPREE_ENDPOINT, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          // Affiche le message de succès en place du formulaire
          form.style.display = 'none';
          success.classList.add('is-visible');
          // Réinitialise le formulaire après 3 secondes
          setTimeout(() => {
            success.classList.remove('is-visible');
            form.reset();
            form.style.display = '';
          }, 3000);
        } else {
          errorBox.textContent = translations[currentLang]['modal.error'];
          errorBox.classList.add('is-visible');
        }
      } catch (err) {
        errorBox.textContent = translations[currentLang]['modal.error'];
        errorBox.classList.add('is-visible');
      } finally {
        submitBtn.disabled = false;
        submitLabel.textContent = originalLabel;
      }
    });


    // ===== BOUTON RETOUR EN HAUT =====
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 500);
    }, { passive: true });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ===== FOOTER YEAR =====
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== HAMBURGER =====
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('is-open');
      mobileMenu.classList.toggle('is-open');
    });
    document.querySelectorAll('.mobile-menu__link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('is-open');
        mobileMenu.classList.remove('is-open');
      });
    });
  </script>
