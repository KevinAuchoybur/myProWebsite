<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>OG Image – Kevin Auchoybur</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e5e7eb;
      min-height: 100vh;
    }

    /* La carte au format LinkedIn : 1200 x 627 */
    .og {
      width: 1200px;
      height: 627px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #f5f3ff 55%, #ede9fe 100%);
      display: flex;
      align-items: center;
      padding: 0 70px;
    }

    /* Blobs décoratifs */
    .og__blob1 {
      position: absolute;
      right: -120px;
      top: -120px;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #c4b5fd 0%, #7C6EF8 100%);
      opacity: 0.85;
    }
    .og__blob2 {
      position: absolute;
      right: 180px;
      bottom: -160px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #ede9fe;
      opacity: 0.7;
    }

    /* Colonne texte (gauche) */
    .og__text {
      position: relative;
      z-index: 2;
      max-width: 640px;
    }

    .og__logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #7C6EF8;
      color: #7C6EF8;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -1px;
      margin-bottom: 30px;
    }

    .og__name {
      font-size: 60px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .og__role {
      font-size: 38px;
      font-weight: 800;
      color: #7C6EF8;
      margin-bottom: 28px;
    }

    .og__tagline {
      border-left: 4px solid #7C6EF8;
      padding-left: 20px;
    }
    .og__tagline-motto {
      display: block;
      font-size: 26px;
      font-weight: 700;
      font-style: italic;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .og__tagline-sub {
      display: block;
      font-size: 20px;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.4;
    }

    .og__url {
      margin-top: 36px;
      font-size: 18px;
      font-weight: 600;
      color: #7C6EF8;
    }

    /* Photo (droite) */
    .og__photo-wrap {
      position: relative;
      z-index: 3;
      margin-left: auto;
      flex-shrink: 0;
    }
    .og__photo {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid #ffffff;
      box-shadow: 0 20px 50px rgba(124, 110, 248, 0.35);
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="og__blob1"></div>
    <div class="og__blob2"></div>

    <div class="og__text">
      <span class="og__logo">KA</span>
      <div class="og__name">Kevin Auchoybur</div>
      <div class="og__role">Analyste QA</div>
      <div class="og__tagline">
        <span class="og__tagline-motto">Tester, c'est anticiper.</span>
        <span class="og__tagline-sub">Je détecte les anomalies avant qu'elles n'atteignent vos utilisateurs.</span>
      </div>
      <div class="og__url">kevinauchoybur.github.io</div>
    </div>

    <div class="og__photo-wrap">
      <img src="assets/photo.png" alt="Kevin Auchoybur" class="og__photo" />
    </div>
  </div>
</body>
</html>
